{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="card form-card">
  <h2>Login</h2>
  <p class="muted">Access your career dashboard and interview sessions.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Login</button>
  </form>
  <p class="muted">No account? <a href="{% url 'accounts:register' %}">Register here</a>.</p>
</section>
{% endblock %}
